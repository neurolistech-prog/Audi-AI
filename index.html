<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audi AI Experience</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
</head>

<body>

    <div id="scroll-container">
        <section class="panel">

            <div class="audi-hud">
                <div class="hud-ring ring-outer"></div>
                <div class="hud-ring ring-mid"></div>
                <div class="hud-core">
                    <span class="ai-text">AUDI AI</span>
                </div>
            </div>

            <div class="content">
                <div class="brand">AUDI INTELLIGENCE</div>

                <div class="specs-grid">
                    <div class="spec-item">
                        <div class="spec-label">AUTONOMOUS DRIVING</div>
                        <div class="spec-value">LEVEL 4</div>
                    </div>
                    <div class="spec-item">
                        <div class="spec-label">NEURAL NETWORK</div>
                        <div class="spec-value">980 TFLOPS</div>
                    </div>
                    <div class="spec-item">
                        <div class="spec-label">PREDICTIVE RANGE</div>
                        <div class="spec-value">850 KM</div>
                    </div>
                </div>
            </div>

        </section>
    </div>

    <script src="app.js"></script>
</body>

</html>
